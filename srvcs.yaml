schemaVersion: 1
name: "srvcs-distance3d"
slug: "distance3d"
repository: "srvcs/distance3d"
package: "srvcs-distance3d"
function: "geometry: distance between two 3D points"
kind: "orchestrator"
categories:
  - "geometry"
dependencies:
  - slug: "floatsubtract"
    service: "srvcs-floatsubtract"
  - slug: "floatmultiply"
    service: "srvcs-floatmultiply"
  - slug: "floatadd"
    service: "srvcs-floatadd"
  - slug: "sqrt"
    service: "srvcs-sqrt"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "x1"
    type: "json"
    required: true
  - name: "y1"
    type: "json"
    required: true
  - name: "z1"
    type: "json"
    required: true
  - name: "x2"
    type: "json"
    required: true
  - name: "y2"
    type: "json"
    required: true
  - name: "z2"
    type: "json"
    required: true
outputs:
  - name: "x1"
    type: "json"
  - name: "y1"
    type: "json"
  - name: "z1"
    type: "json"
  - name: "x2"
    type: "json"
  - name: "y2"
    type: "json"
  - name: "z2"
    type: "json"
  - name: "result"
    type: "number"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_FLOATADD_URL"
    default: "http://127.0.0.1:8092"
    purpose: "Base URL for srvcs-floatadd"
  - name: "SRVCS_FLOATMULTIPLY_URL"
    default: ""
    purpose: "Base URL for srvcs-floatmultiply"
  - name: "SRVCS_FLOATSUBTRACT_URL"
    default: ""
    purpose: "Base URL for srvcs-floatsubtract"
  - name: "SRVCS_SQRT_URL"
    default: "http://127.0.0.1:8093"
    purpose: "Base URL for srvcs-sqrt"
